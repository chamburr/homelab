controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/fdarveau/flame
          tag: latest@sha256:ccd4718f42871d5c9803e269e2201ab7879faeafe2274ce59a8a309a181b1862
        env:
          PASSWORD:
            valueFrom:
              secretKeyRef:
                name: flame
                key: password
    annotations:
      reloader.stakater.com/auto: "true"
service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 5005
ingress:
  main:
    className: traefik
    hosts:
      - host: chamburr.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
persistence:
  data:
    existingClaim: flame
    globalMounts:
      - path: /app/data
