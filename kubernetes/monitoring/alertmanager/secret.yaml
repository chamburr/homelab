apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    template:
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        ntfy-topic: "{{ .ntfy_topic }}"
        ntfy-token: "{{ .ntfy_token }}"
        __basic-auth.yml: |
          basic_auth_users:
            {{ .username }}: {{ bcrypt .password }}
        __ntfy-auth.scfg: |
          ntfy {
            server https://ntfy.chamburr.xyz
            topic {{ .ntfy_topic }}
            access-token {{ .ntfy_token }}
          }
  dataFrom:
    - extract:
        key: /monitoring/alertmanager
