apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: netmaker
  namespace: networking
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    template:
      data:
        secret: "{{ .secret }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  dataFrom:
    - extract:
        key: /networking/netmaker
