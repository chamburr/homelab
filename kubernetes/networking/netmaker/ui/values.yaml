controllers:
  main:
    containers:
      main:
        image:
          repository: docker.io/gravitl/netmaker-ui
          tag: v0.30.0
        env:
          BACKEND_URL: https://netmaker-api.chamburr.xyz
service:
  main:
    controller: main
    ports:
      http:
        port: 80
ingress:
  main:
    className: traefik
    hosts:
      - host: netmaker.chamburr.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
