controllers:
  main:
    containers:
      main:
        image:
          repository: public.ecr.aws/docker/library/eclipse-mosquitto
          tag: 2.0.20-openssl
        command:
          - /bin/ash
        args:
          - /mosquitto/config/wait.sh
        env:
          MQ_USERNAME:
            valueFrom:
              secretKeyRef:
                name: netmaker
                key: username
          MQ_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: netmaker
                key: password
    annotations:
      reloader.stakater.com/auto: "true"
service:
  main:
    controller: main
    ports:
      http:
        port: 8883
      mqtt:
        port: 1883
ingress:
  main:
    className: traefik
    hosts:
      - host: netmaker-mqtt.chamburr.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
persistence:
  config:
    type: configMap
    name: netmaker-mqtt
    globalMounts:
      - path: /mosquitto/config
