apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync
  namespace: system
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolSyncComponentAbsent
          expr: absent(up{job="volsync-metrics"})
          for: 15m
          annotations:
            summary: VolSync component has disappeared from Prometheus target discovery.
          labels:
            severity: critical
        - alert: VolSyncVolumeOutOfSync
          expr: volsync_volume_out_of_sync == 1
          for: 15m
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume is out of sync.
          labels:
            severity: critical
