controllers:
  main:
    containers:
      main:
        image:
          repository: docker.io/tensorchord/pgvecto-rs
          tag: pg16-v0.3.0
        args:
          - postgres
          - -c
          - shared_preload_libraries=vectors.so
          - -c
          - search_path="$user", public, vectors
        env:
          POSTGRES_USER: postgres
          POSTRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich
                key: postgres-password
          POSTGRES_DB: immich
    annotations:
      reloader.stakater.com/auto: "true"
service:
  main:
    controller: main
    ports:
      http:
        port: 5432
persistence:
  data:
    existingClaim: immich-postgres
    globalMounts:
      - path: /var/lib/postgresql/data
