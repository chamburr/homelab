controllers:
  main:
    containers:
      main:
        image:
          repository: public.ecr.aws/docker/library/nextcloud
          tag: 30.0.6-apache
        env:
          POSTGRES_DB: nextcloud
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: nextcloud
                key: postgres-password
          POSTGRES_HOST: nextcloud-postgres
          REDIS_HOST: postgres-redis
          REDIS_HOST_PORT: 6379
          REDIS_HOST_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: nextcloud
                key: redis-password
          SMTP_HOST:
            valueFrom:
              secretKeyRef:
                name: global
                key: mail-host
          SMTP_SECURE: tls
          SMTP_PORT:
            valueFrom:
              secretKeyRef:
                name: global
                key: mail-port
          SMTP_NAME:
            valueFrom:
              secretKeyRef:
                name: global
                key: mail-username
          SMTP_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: global
                key: mail-password
          MAIL_FROM_ADDRESS:
            valueFrom:
              secretKeyRef:
                name: global
                key: __mail-sender-local
          MAIL_DOMAIN:
            valueFrom:
              secretKeyRef:
                name: global
                key: __mail-sender-domain
          PHP_MEMORY_LIMIT: 1G
          PHP_UPLOAD_LIMIT: 32G
          APACHE_BODY_LIMIT: 0
      cron:
        image:
          repository: public.ecr.aws/docker/library/nextcloud
          tag: 30.0.6-apache
        command:
          - /cron.sh
      push:
        image:
          repository: docker.io/icewind1991/notify_push
          tag: 1.0.0
        env:
          NEXTCLOUD_URL: http://nextcloud:80
    annotations:
      reloader.stakater.com/auto: "true"
service:
  main:
    controller: main
    ports:
      http:
        port: 80
ingress:
  main:
    className: traefik
    hosts:
      - host: cloud.chamburr.xyz
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
persistence:
  data:
    existingClaim: nextcloud
    globalMounts:
      - path: /var/www/html
